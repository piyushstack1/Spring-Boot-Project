spring.application.name=airbnb

# Server
server.port=${PORT:8081}
server.servlet.context-path=/api/v1

# Which profile to run ? overridden by SPRING_PROFILES_ACTIVE env var in EB/prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Common DB credentials (value comes from env var, same name used in both profiles)
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secretKey=${JWT_SECRET}

razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}

frontend.url=${FRONTEND_URL}
