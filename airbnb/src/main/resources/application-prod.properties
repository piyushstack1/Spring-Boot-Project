# Production database ? RDS endpoint, supplied via env var on Elastic Beanstalk
spring.datasource.url=${DB_URL}

# Flyway now owns schema changes in prod ? Hibernate only validates, never auto-modifies
spring.jpa.hibernate.ddl-auto=validate

# Flyway enabled ? manages all schema changes from here on
spring.flyway.enabled=true

# IMPORTANT: RDS already has tables (created earlier by Hibernate ddl-auto=update).
# baseline-on-migrate tells Flyway: "if the schema_history table doesn't exist yet,
# don't try to re-run V1 ? just mark V1 as already applied (baseline) and continue
# from V2 onwards." This runs ONLY ONCE; after that Flyway's history table exists
# and this setting becomes a no-op.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1